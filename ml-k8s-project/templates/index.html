<!DOCTYPE html>
<html>
<head>
    <title>Sales Prediction App</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        h2 {
            margin-bottom: 20px;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
        }
    </style>
</head>

<body>
    <h1>📊 Sales Prediction System</h1>

    <div class="container">
        <form action="/predict" method="POST">
            <input type="number" name="experience" placeholder="Experience" required>
            <input type="number" name="marketing_spend" placeholder="Marketing Spend" required>
            <input type="number" name="store_size" placeholder="Store Size" required>

            <button type="submit">Predict Sales</button>
        </form>

        {% if prediction %}
        <div class="result">
            💰 Predicted Sales: {{ prediction }}
        </div>
        {% endif %}
    </div>
</body>
</html>
