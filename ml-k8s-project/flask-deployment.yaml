apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-container
        image: flask-app:latest  # Aapki docker image ka naam
        imagePullPolicy: Never    # Ye important hai local image ke liye
        ports:
        - containerPort: 5000